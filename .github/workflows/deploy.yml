name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # メインのブランチ名が「master」の場合は「master」に書き換えてください

  # 手動実行も可能にする設定
  workflow_dispatch:

# 必要最小限の権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

# 二重ビルドを防ぐ設定
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
