name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # mainブランチにプッシュされたら自動起動
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Node.js 22を使用（警告への対策もバッチリです）
          # cache: 'npm'  <-- エラー回避のため、あえてこのキャッシュ指定を外しています！

      - name: Install dependencies
        run: npm ci || npm install # ロックファイルがなくても動くようにフォールバックします

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Viteの出力フォルダである「dist」を指定

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
